<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Control</title>
    <style>

    </style>
</head>
<body>
    <div class="container">

        <div class="wrap">

            <div class="scoreboard-control">
                <div class="control-playername" id="controlInputPlayername1">
                    <label for="playername1">Playername 1</label>
                    <input type="text" id="playername1" name="playername1"> 
                    <button onclick="setplayername1(JSON.stringify(document.getElementById('playername1').value))">SET</button>
                </div>
                <div class="control-score"></div>
            </div>
            
            <div class="scoreboard-control">
                <div class="control-playername" id="controlInputPlayername2">
                    <label for="playername2">Playername 2</label>
                    <input type="text" id="playername2" name="playername2"> 
                    <button onclick="setplayername2(JSON.stringify(document.getElementById('playername2').value))">SET</button>
                </div>
                <div class="control-score"></div>
            </div>

        </div>

    </div>

    <script>

    // Populate input fields from localStorage (stored as JSON)
    window.addEventListener('DOMContentLoaded', () => {
    ['playername1', 'playername2'].forEach(id => {
        const raw = localStorage.getItem(id);
        if (!raw) return;
            try {
                const obj = JSON.parse(raw);
                if (obj && obj.name) document.getElementById(id).value = obj.name;
            } catch (e) {
                document.getElementById(id).value = raw;
            }
        });
    });

    function parseMaybeJson(input) {
    if (input == null) return '';
        try {
            const parsed = JSON.parse(input);
            if (typeof parsed === 'string') return parsed;
            if (parsed && parsed.name) return parsed.name;
        } catch (e) {
            // not JSON
        }
    return input;
    }

    function setplayername1(name) {
        const plain = parseMaybeJson(name);
        localStorage.setItem('playername1', JSON.stringify({ name: plain }));
        console.log('playername1 saved', plain);
    }

    function setplayername2(name) {
        const plain = parseMaybeJson(name);
        localStorage.setItem('playername2', JSON.stringify({ name: plain }));
        console.log('playername2 saved', plain);
    }

    </script>
</body>
</html>
